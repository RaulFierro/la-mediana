<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos - Asociación Cultural La Mediana</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="imagen.jpg" alt="Logo Asociación Cultural La Mediana" class="logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#nosotros">Quiénes somos</a></li>
                <li><a href="index.html#actividades">Actividades</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="seccion-inicio">
            <h1>Galería de Fotos</h1>
            <p>Haz clic en cualquier imagen para verla a tamaño completo.</p>
            
            <div class="galeria-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                <img src="foto1.jpg" alt="Foto 1" class="img-galeria">
                <img src="foto2.jpg" alt="Foto 2" class="img-galeria">
                <img src="foto3.jpg" alt="Foto 3" class="img-galeria">
                <img src="foto4.jpg" alt="Foto 4" class="img-galeria">
                <img src="foto5.jpg" alt="Foto 5" class="img-galeria">
                <img src="foto7.jpg" alt="Foto 6" class="img-galeria">
                <img src="foto8.jpg" alt="Foto 6" class="img-galeria">
                <img src="foto9.jpg" alt="Foto 6" class="img-galeria">
                <img src="foto10.jpg" alt="Foto 6" class="img-galeria">
                
            </div>
            
            <br>
            <a href="index.html" class="boton-volver">Volver a la página principal</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Asociación Cultural La Mediana</p>
    </footer>

    <div id="visor-imagenes" class="modal-visor">
        <span class="cerrar-modal">&times;</span>
        <img class="modal-contenido" id="imagen-ampliada">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const visor = document.getElementById("visor-imagenes");
            const imgAmpliada = document.getElementById("imagen-ampliada");
            const fotos = document.querySelectorAll(".img-galeria");
            const botonCerrar = document.querySelector(".cerrar-modal");

            // Al hacer clic en una foto, abrir el visor y cargar esa imagen
            fotos.forEach(foto => {
                foto.addEventListener("click", function() {
                    visor.style.display = "block";
                    imgAmpliada.src = this.src;
                });
            });

            // Al hacer clic en la X, cerrar el visor
            botonCerrar.addEventListener("click", () => {
                visor.style.display = "none";
            });

            // Al hacer clic fuera de la imagen (en el fondo oscuro), cerrar el visor
            visor.addEventListener("click", (e) => {
                if (e.target === visor) {
                    visor.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
